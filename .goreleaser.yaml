project_name: github_billing_exporter
release:
  github:
    owner: raynigon
    name: github_billing_exporter
builds:
  - id: github_billing_exporter
    goos:
    - linux
    - windows
    - darwin
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
    goarm:
      - "7"
    env:
      - CGO_ENABLED=0
      - GO111MODULE=on
    main: github_billing_exporter.go
    ldflags: -s -w
      -X github.com/raynigon/github_billing_exporter/version.version={{.Version}}
      -X github.com/raynigon/github_billing_exporter/version.gitSHA={{.Commit}}
      -X github.com/raynigon/github_billing_exporter/version.buildTime={{.Date}}
      -extldflags "-static"
    flags: -tags netgo -installsuffix netgo
    binary: github_billing_exporter
    hooks: {}
dockers_v2:
  - dockerfile: "./Dockerfile"
    ids:
      - github_billing_exporter
    images:
    - "ghcr.io/raynigon/github_billing_exporter"
    - "ghcr.io/raynigon/github-billing-exporter"
    tags:
      - "latest"
      - "{{ .Tag }}"
      - "v{{ .Major }}"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/386
      - linux/arm/v7
archives:
  - id: github_billing_exporter
    builds:
      - github_billing_exporter
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"
    files:
      - licence*
      - LICENCE*
      - license*
      - LICENSE*
      - readme*
      - README*
      - changelog*
      - CHANGELOG*
